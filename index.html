<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StratoSort - AI File Organization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .panel h2 {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .button:disabled {
            background: #e2e8f0;
            color: #a0aec0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s ease;
        }
        
        .input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: 500;
            display: none;
        }
        
        .status.success {
            background: #f0fff4;
            color: #38a169;
            border: 1px solid #9ae6b4;
        }
        
        .status.error {
            background: #fed7d7;
            color: #e53e3e;
            border: 1px solid #feb2b2;
        }
        
        .status.info {
            background: #ebf8ff;
            color: #3182ce;
            border: 1px solid #90cdf4;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
            display: none;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .file-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 15px;
            padding: 10px;
            display: none;
        }
        
        .file-item {
            padding: 8px;
            border-bottom: 1px solid #f7fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-item:last-child {
            border-bottom: none;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e2e8f0;
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 StratoSort</h1>
            <p>AI-Powered File Organization</p>
        </div>
        
        <div class="main-content">
            <div class="panel">
                <h2>📁 File Operations</h2>
                <input type="text" id="directoryPath" class="input" placeholder="Enter directory path..." value="C:\Users">
                <button class="button" onclick="scanDirectory()">
                    <span id="scanText">Scan Directory</span>
                    <div id="scanLoading" class="loading" style="display: none;"></div>
                </button>
                <button class="button" onclick="analyzeFiles()">
                    <span id="analyzeText">Analyze Files</span>
                    <div id="analyzeLoading" class="loading" style="display: none;"></div>
                </button>
                <button class="button" onclick="organizeFiles()">
                    <span id="organizeText">Auto-Organize</span>
                    <div id="organizeLoading" class="loading" style="display: none;"></div>
                </button>
                
                <div id="fileStatus" class="status"></div>
                <div id="fileProgress" class="progress-bar">
                    <div id="fileProgressFill" class="progress-fill"></div>
                </div>
                <div id="fileList" class="file-list"></div>
            </div>
            
            <div class="panel">
                <h2>🤖 AI Services</h2>
                <input type="text" id="searchQuery" class="input" placeholder="Search files with AI...">
                <button class="button" onclick="semanticSearch()">
                    <span id="searchText">Semantic Search</span>
                    <div id="searchLoading" class="loading" style="display: none;"></div>
                </button>
                <button class="button" onclick="checkOllamaStatus()">
                    <span id="ollamaText">Check Ollama Status</span>
                    <div id="ollamaLoading" class="loading" style="display: none;"></div>
                </button>
                <button class="button" onclick="testConnection()">
                    <span id="testText">Test Backend</span>
                    <div id="testLoading" class="loading" style="display: none;"></div>
                </button>
                
                <div id="aiStatus" class="status"></div>
                <div id="searchResults" class="file-list"></div>
            </div>
        </div>
        
        <div class="footer">
            StratoSort v0.1.0 - Built with Tauri & Rust 🦀
        </div>
    </div>

    <script>
        // Initialize Tauri API
        const { invoke } = window.__TAURI__.tauri;
        const { listen } = window.__TAURI__.event;
        
        // Listen for progress events
        listen('operation-progress', (event) => {
            const { operation_id, progress, message } = event.payload;
            updateProgress(progress * 100, message);
        });
        
        // Utility functions
        function showStatus(elementId, message, type = 'info') {
            const statusEl = document.getElementById(elementId);
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            statusEl.style.display = 'block';
        }
        
        function hideStatus(elementId) {
            const statusEl = document.getElementById(elementId);
            statusEl.style.display = 'none';
        }
        
        function showLoading(loadingId, textId, text = '') {
            document.getElementById(loadingId).style.display = 'inline-block';
            document.getElementById(textId).textContent = text || 'Loading...';
        }
        
        function hideLoading(loadingId, textId, originalText) {
            document.getElementById(loadingId).style.display = 'none';
            document.getElementById(textId).textContent = originalText;
        }
        
        function updateProgress(percent, message) {
            const progressBar = document.getElementById('fileProgress');
            const progressFill = document.getElementById('fileProgressFill');
            
            progressBar.style.display = 'block';
            progressFill.style.width = percent + '%';
            
            if (percent >= 100) {
                setTimeout(() => {
                    progressBar.style.display = 'none';
                }, 2000);
            }
        }
        
        // File Operations
        async function scanDirectory() {
            const path = document.getElementById('directoryPath').value;
            if (!path) {
                showStatus('fileStatus', 'Please enter a directory path', 'error');
                return;
            }
            
            showLoading('scanLoading', 'scanText', 'Scanning...');
            hideStatus('fileStatus');
            
            try {
                const files = await invoke('scan_directory', { 
                    path: path, 
                    recursive: true 
                });
                
                hideLoading('scanLoading', 'scanText', 'Scan Directory');
                showStatus('fileStatus', `Found ${files.length} files`, 'success');
                displayFiles(files, 'fileList');
                
            } catch (error) {
                hideLoading('scanLoading', 'scanText', 'Scan Directory');
                showStatus('fileStatus', `Error: ${error}`, 'error');
                console.error('Scan error:', error);
            }
        }
        
        async function analyzeFiles() {
            const path = document.getElementById('directoryPath').value;
            if (!path) {
                showStatus('fileStatus', 'Please enter a directory path', 'error');
                return;
            }
            
            showLoading('analyzeLoading', 'analyzeText', 'Analyzing...');
            hideStatus('fileStatus');
            
            try {
                // First scan to get files
                const files = await invoke('scan_directory', { 
                    path: path, 
                    recursive: false 
                });
                
                if (files.length === 0) {
                    hideLoading('analyzeLoading', 'analyzeText', 'Analyze Files');
                    showStatus('fileStatus', 'No files found to analyze', 'info');
                    return;
                }
                
                // Analyze first 10 files for demo
                const filePaths = files.slice(0, 10).map(f => f.path);
                const analyses = await invoke('batch_analyze_files', { 
                    paths: filePaths 
                });
                
                hideLoading('analyzeLoading', 'analyzeText', 'Analyze Files');
                showStatus('fileStatus', `Analyzed ${analyses.length} files`, 'success');
                
            } catch (error) {
                hideLoading('analyzeLoading', 'analyzeText', 'Analyze Files');
                showStatus('fileStatus', `Analysis error: ${error}`, 'error');
                console.error('Analysis error:', error);
            }
        }
        
        async function organizeFiles() {
            const path = document.getElementById('directoryPath').value;
            if (!path) {
                showStatus('fileStatus', 'Please enter a directory path', 'error');
                return;
            }
            
            showLoading('organizeLoading', 'organizeText', 'Organizing...');
            hideStatus('fileStatus');
            
            try {
                const previews = await invoke('auto_organize_directory', {
                    directoryPath: path,
                    useAi: true
                });
                
                hideLoading('organizeLoading', 'organizeText', 'Auto-Organize');
                showStatus('fileStatus', `Generated ${previews.length} organization suggestions`, 'success');
                
            } catch (error) {
                hideLoading('organizeLoading', 'organizeText', 'Auto-Organize');
                showStatus('fileStatus', `Organization error: ${error}`, 'error');
                console.error('Organization error:', error);
            }
        }
        
        // AI Operations
        async function semanticSearch() {
            const query = document.getElementById('searchQuery').value;
            if (!query) {
                showStatus('aiStatus', 'Please enter a search query', 'error');
                return;
            }
            
            showLoading('searchLoading', 'searchText', 'Searching...');
            hideStatus('aiStatus');
            
            try {
                const results = await invoke('semantic_search', {
                    query: query,
                    limit: 10
                });
                
                hideLoading('searchLoading', 'searchText', 'Semantic Search');
                showStatus('aiStatus', `Found ${results.length} matches`, 'success');
                displaySearchResults(results, 'searchResults');
                
            } catch (error) {
                hideLoading('searchLoading', 'searchText', 'Semantic Search');
                showStatus('aiStatus', `Search error: ${error}`, 'error');
                console.error('Search error:', error);
            }
        }
        
        async function checkOllamaStatus() {
            showLoading('ollamaLoading', 'ollamaText', 'Checking...');
            hideStatus('aiStatus');
            
            try {
                const status = await invoke('check_ollama_status');
                
                hideLoading('ollamaLoading', 'ollamaText', 'Check Ollama Status');
                
                if (status.is_running) {
                    showStatus('aiStatus', `Ollama is running with ${status.models.length} models`, 'success');
                } else {
                    showStatus('aiStatus', 'Ollama is not available', 'error');
                }
                
            } catch (error) {
                hideLoading('ollamaLoading', 'ollamaText', 'Check Ollama Status');
                showStatus('aiStatus', `Status check error: ${error}`, 'error');
                console.error('Ollama status error:', error);
            }
        }
        
        async function testConnection() {
            showLoading('testLoading', 'testText', 'Testing...');
            hideStatus('aiStatus');
            
            try {
                // Simple test - try to get Ollama status
                await invoke('check_ollama_status');
                
                hideLoading('testLoading', 'testText', 'Test Backend');
                showStatus('aiStatus', 'Backend connection successful!', 'success');
                
            } catch (error) {
                hideLoading('testLoading', 'testText', 'Test Backend');
                showStatus('aiStatus', `Backend connection failed: ${error}`, 'error');
                console.error('Connection test error:', error);
            }
        }
        
        // Display functions
        function displayFiles(files, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            container.style.display = 'block';
            
            files.slice(0, 20).forEach(file => {  // Show first 20 files
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <span>${file.name}</span>
                    <span>${(file.size / 1024).toFixed(1)} KB</span>
                `;
                container.appendChild(fileItem);
            });
            
            if (files.length > 20) {
                const moreItem = document.createElement('div');
                moreItem.className = 'file-item';
                moreItem.innerHTML = `<span><em>... and ${files.length - 20} more files</em></span>`;
                container.appendChild(moreItem);
            }
        }
        
        function displaySearchResults(results, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            container.style.display = 'block';
            
            results.forEach(result => {
                const resultItem = document.createElement('div');
                resultItem.className = 'file-item';
                resultItem.innerHTML = `
                    <span>${result.path}</span>
                    <span>${result.category || 'Unknown'}</span>
                `;
                container.appendChild(resultItem);
            });
        }
        
        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            console.log('StratoSort frontend initialized');
            
            // Test backend connection on load
            setTimeout(() => {
                testConnection();
            }, 1000);
        });
    </script>
</body>
</html>
