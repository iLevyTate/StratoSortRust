<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 88" width="380" height="88">
  <!--
    Stratosort wordmark — glyph + name + tagline.
    Glyph mirrors `logo.svg` exactly so the favicon and the README header
    read as the same mark.
  -->
  <defs>
    <linearGradient id="ssPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>

  <!-- Logo glyph -->
  <g transform="translate(6, 12)">
    <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#ssPanel)"/>
    <rect x="13" y="15" width="38" height="8" rx="4" fill="#93c5fd"/>
    <rect x="13" y="29" width="38" height="8" rx="4" fill="#3b82f6"/>
    <rect x="13" y="43" width="38" height="8" rx="4" fill="#1e3a8a"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="88" y="48"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif"
        font-size="36" font-weight="700" fill="#0f172a">Stratosort</text>
  <text x="88" y="70"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif"
        font-size="14" font-weight="500" fill="#475569">Local-first AI file organization</text>
</svg>
