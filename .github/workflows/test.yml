name: Test Suite (full matrix — PR + push to main)

# Broader-than-ci.yml matrix:
#  * Backend tests across all 3 OSes (ci.yml only covers Linux)
#  * Playwright e2e across browsers
#  * axe-core accessibility check
#
# With #37 resolved (the e2e suite now installs mocks via
# `page.addInitScript` before navigation, and `$lib/api/tauri.ts` routes
# invokes through `window.__TAURI_MOCK__` when set), data-driven e2e tests
# actually exercise wrapper code paths. The matrix is safe to gate PRs on.
#
# The PR gate (lint, frontend type check + unit, backend tests, Linux
# bundle build) still lives in ci.yml; this workflow stacks on top with
# the cross-platform / cross-browser surface.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # Cross-platform backend tests. ci.yml only runs these on Linux; this
  # job exists to catch platform-specific regressions (Windows path
  # quirks, macOS file watcher behavior, etc.).
  backend-tests:
    name: Backend Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        # See ci.yml for the per-package rationale. The 4.1 stack is what
        # ships on ubuntu-22.04 + ubuntu-24.04 runners.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # `generate_context!()` reads tauri.conf.json at compile time and
      # requires `frontendDist` (`../dist`) to exist on disk. Mirrors the
      # same prebuild step ci.yml uses for backend-tests + lint.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build frontend (populates ../dist for generate_context!)
        run: npm ci && npm run build

      - name: Lib tests
        working-directory: src-tauri
        run: cargo test --lib --no-fail-fast

  # Playwright e2e across browser × OS. The webServer is `npm run preview`
  # (per playwright.config.ts), so this hits a static vite preview. Tests
  # use the `window.__TAURI_MOCK__` hook in `$lib/api/tauri.ts` to mock
  # backend commands, so data-driven assertions work without a Tauri runtime.
  e2e-tests:
    name: E2E Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chromium, firefox, webkit]
        exclude:
          # Playwright doesn't ship webkit drivers on Windows runners.
          - os: windows-latest
            browser: webkit

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build frontend
        run: npm run build

      - name: Run E2E tests (Linux, headless via xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a npm run test:e2e -- --project=${{ matrix.browser }}

      - name: Run E2E tests (Windows/macOS)
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:e2e -- --project=${{ matrix.browser }}

      - name: Upload Playwright artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-artifacts-${{ matrix.os }}-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/

  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install system dependencies
        # Headless Playwright still needs xvfb for the browser launches.
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        # The a11y config runs chromium + firefox + webkit (see
        # playwright.accessibility.config.ts), so we install all three.
        # The per-browser e2e matrix above installs one at a time because
        # each matrix entry only runs its own --project.
        run: |
          npm ci
          npx playwright install --with-deps chromium firefox webkit

      - name: Build frontend
        run: npm run build

      - name: Run accessibility tests
        run: xvfb-run -a npx playwright test --config=playwright.accessibility.config.ts

      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-report
          path: |
            accessibility-report/
            test-results/
