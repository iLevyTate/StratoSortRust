name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]
        exclude:
          # Reduce CI load by excluding beta on non-Linux
          - os: windows-latest
            rust: beta
          - os: macos-latest
            rust: beta

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev
        sudo apt-get install -y build-essential curl wget libssl-dev

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        # Install required dependencies for macOS
        brew install --cask xquartz || true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install SQLx CLI
      run: cargo install sqlx-cli --no-default-features --features rustls,sqlite

    - name: Create data directory
      run: mkdir -p data

    - name: Setup test database
      working-directory: ./src-tauri
      env:
        DATABASE_URL: sqlite:../data/test.db
      run: |
        sqlx database create
        sqlx migrate run

    - name: Check code formatting
      working-directory: ./src-tauri
      run: cargo fmt -- --check

    - name: Run Clippy
      working-directory: ./src-tauri
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Check for security vulnerabilities
      working-directory: ./src-tauri
      run: |
        cargo install cargo-audit || echo "cargo-audit already installed"
        cargo audit

    - name: Run unit tests
      working-directory: ./src-tauri
      env:
        DATABASE_URL: sqlite:../data/test.db
        RUST_LOG: stratosort=debug,sqlx=warn
        TEST_MODE: true
      run: cargo test --lib --verbose

    - name: Run integration tests
      working-directory: ./src-tauri
      env:
        DATABASE_URL: sqlite:../data/test.db
        RUST_LOG: stratosort=debug
        TEST_MODE: true
        INTEGRATION_TESTS_ENABLED: true
      run: cargo test --test '*' --verbose

    - name: Run doctests
      working-directory: ./src-tauri
      run: cargo test --doc

    - name: Test build (debug)
      working-directory: ./src-tauri
      run: cargo build --verbose

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev

    - name: Install coverage tool
      run: cargo install cargo-tarpaulin

    - name: Install SQLx CLI
      run: cargo install sqlx-cli --no-default-features --features rustls,sqlite

    - name: Create data directory
      run: mkdir -p data

    - name: Setup test database
      working-directory: ./src-tauri
      env:
        DATABASE_URL: sqlite:../data/test.db
      run: |
        sqlx database create
        sqlx migrate run

    - name: Generate code coverage
      working-directory: ./src-tauri
      env:
        DATABASE_URL: sqlite:../data/test.db
        RUST_LOG: warn
        TEST_MODE: true
      run: |
        cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml --output-dir ../coverage/

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/cobertura.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build Application
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Tauri CLI
      run: cargo install tauri-cli --version "^2.0"

    - name: Create data directory
      run: mkdir -p data

    - name: Install SQLx CLI and setup database
      working-directory: ./src-tauri
      run: |
        cargo install sqlx-cli --no-default-features --features rustls,sqlite
        sqlx database create --database-url sqlite:../data/stratosort.db
        sqlx migrate run

    - name: Build application (debug)
      env:
        DATABASE_URL: sqlite:./data/stratosort.db
      run: cargo tauri build --debug

    - name: Upload build artifacts (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: linux-artifacts
        path: |
          src-tauri/target/debug/bundle/deb/*.deb
          src-tauri/target/debug/bundle/appimage/*.AppImage

    - name: Upload build artifacts (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: windows-artifacts
        path: |
          src-tauri/target/debug/bundle/msi/*.msi

    - name: Upload build artifacts (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: macos-artifacts
        path: |
          src-tauri/target/debug/bundle/dmg/*.dmg

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Run cargo audit
      working-directory: ./src-tauri
      run: |
        cargo install cargo-audit
        cargo audit

    - name: Run cargo deny
      working-directory: ./src-tauri
      run: |
        cargo install cargo-deny
        cargo deny check

    - name: Check for common security issues
      working-directory: ./src-tauri
      run: |
        # Check for hardcoded secrets (basic check)
        ! grep -r "password\|secret\|token\|key" --include="*.rs" src/ || echo "Warning: Potential secrets found"
        
        # Check for unsafe code blocks
        if grep -r "unsafe" --include="*.rs" src/; then
          echo "Warning: Unsafe code blocks found - review for security"
        fi

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev

    - name: Install SQLx CLI
      run: cargo install sqlx-cli --no-default-features --features rustls,sqlite

    - name: Setup test database
      working-directory: ./src-tauri
      run: |
        mkdir -p ../data
        sqlx database create --database-url sqlite:../data/test.db
        sqlx migrate run

    - name: Run performance benchmarks
      working-directory: ./src-tauri
      env:
        DATABASE_URL: sqlite:../data/test.db
      run: |
        # Run specific performance tests if they exist
        cargo test --release --test '*' -- --ignored --test-threads=1 || echo "No performance tests found"

    - name: Profile application startup
      working-directory: ./src-tauri
      env:
        DATABASE_URL: sqlite:../data/test.db
      run: |
        time cargo run --release --bin stratosort -- --version || echo "Binary execution test completed"