name: CI / Lint, Format & Backend Tests

# Runs on every PR and on every push to main so we catch regressions
# automatically. The comprehensive matrix (frontend + e2e + a11y) lives in
# test.yml and stays workflow_dispatch-only until the frontend exists.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Quick sanity checks
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt -- --check
        continue-on-error: true

      - name: Run clippy
        working-directory: src-tauri
        # Not -D warnings yet — there are pre-existing dead-code warnings we
        # haven't cleaned up. Flip to -D warnings once those are addressed.
        run: cargo clippy --no-deps
        continue-on-error: true

  # Backend tests — the load-bearing layer. These must stay green on every PR.
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build (default features)
        working-directory: src-tauri
        run: cargo build --message-format=short

      - name: Run library tests
        working-directory: src-tauri
        # Lib tests cover the dispatcher, JSON parse helpers, watch-mode walker,
        # delete helpers, etc. These should always pass without external deps.
        run: cargo test --lib --no-fail-fast

      - name: Run integration tests
        working-directory: src-tauri
        # `--tests` runs every integration target Cargo knows about. The
        # `test_ollama_*` Ollama-dependent tests are marked `#[ignore]` and
        # only run when explicitly opted in with `-- --ignored`. The
        # tests/security/*.rs files were written against an outdated
        # Database API and are commented out of Cargo.toml as documented
        # there, so they don't block the build.
        run: cargo test --tests --no-fail-fast