name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  PKG_CONFIG_ALLOW_SYSTEM_CFLAGS: 1
  PKG_CONFIG_ALLOW_SYSTEM_LIBS: 1
  RUST_BACKTRACE: 1
  # SQLite configuration
  SQLITE3_LIB_DIR: /usr/lib/x86_64-linux-gnu
  SQLITE3_INCLUDE_DIR: /usr/include
  # OpenSSL configuration
  OPENSSL_DIR: /usr
  OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
  OPENSSL_INCLUDE_DIR: /usr/include
  # Library paths
  LD_LIBRARY_PATH: /usr/local/lib:/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
  LIBRARY_PATH: /usr/local/lib:/usr/lib/x86_64-linux-gnu:$LIBRARY_PATH
  # pkg-config paths
  PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:$PKG_CONFIG_PATH
  # Disable interactive mode for any tools
  DEBIAN_FRONTEND: noninteractive
  # Build optimizations
  CARGO_NET_RETRY: 10
  CARGO_INCREMENTAL: 0

jobs:
  basic-checks:
    name: Basic Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        
        # Core build tools and Tauri dependencies
        sudo apt-get install -y \
          build-essential \
          curl \
          wget \
          file \
          pkg-config \
          cmake \
          clang \
          llvm \
          gcc \
          g++ \
          make \
          autoconf \
          automake \
          libtool
        
        # Tauri GTK/WebKit dependencies
        sudo apt-get install -y \
          libwebkit2gtk-4.0-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libglib2.0-dev \
          libjavascriptcoregtk-4.0-dev \
          libsoup2.4-dev \
          libcairo2-dev \
          libpango1.0-dev \
          libgdk-pixbuf2.0-dev \
          libatk1.0-dev
        
        # SSL/TLS and cryptography libraries
        sudo apt-get install -y \
          libssl-dev \
          openssl \
          ca-certificates
        
        # SQLite and database dependencies
        sudo apt-get install -y \
          libsqlite3-dev \
          sqlite3
        
        # Image processing libraries (for image crate)
        sudo apt-get install -y \
          libjpeg-dev \
          libpng-dev \
          libwebp-dev \
          libgif-dev \
          libtiff-dev \
          libavif-dev \
          libheif-dev \
          libraw-dev \
          libexif-dev \
          imagemagick
        
        # Document processing libraries
        sudo apt-get install -y \
          libpoppler-dev \
          libpoppler-glib-dev \
          poppler-utils \
          libxml2-dev \
          libxslt1-dev \
          libyaml-dev
        
        # Archive and compression libraries
        sudo apt-get install -y \
          libarchive-dev \
          libzip-dev \
          zlib1g-dev \
          libbz2-dev \
          liblzma-dev \
          libzstd-dev \
          p7zip-full \
          unrar || true  # unrar might not be available in all repos
        
        # Audio/Video processing libraries (for multimedia features)
        sudo apt-get install -y \
          libavcodec-dev \
          libavformat-dev \
          libavutil-dev \
          libswscale-dev \
          libavdevice-dev \
          libavfilter-dev \
          ffmpeg \
          libmp3lame-dev \
          libvorbis-dev \
          libopus-dev \
          libflac-dev \
          libasound2-dev \
          libpulse-dev
        
        # Additional multimedia codecs and support
        sudo apt-get install -y \
          libtheora-dev \
          libvpx-dev \
          libx264-dev \
          libx265-dev \
          libopencore-amrnb-dev \
          libopencore-amrwb-dev \
          libspeex-dev
        
        # Font and text rendering libraries
        sudo apt-get install -y \
          libfreetype6-dev \
          libfontconfig1-dev \
          libharfbuzz-dev
        
        # System monitoring and utilities
        sudo apt-get install -y \
          libsensors-dev \
          lm-sensors
        
        # OCR libraries (optional, for future use)
        sudo apt-get install -y \
          tesseract-ocr \
          libtesseract-dev \
          libleptonica-dev || true
        
        # Additional file type detection
        sudo apt-get install -y \
          libmagic-dev \
          file
        
        # X11 libraries (might be needed for some GUI operations)
        sudo apt-get install -y \
          libx11-dev \
          libxext-dev \
          libxrender-dev \
          libxrandr-dev \
          libxi-dev \
          libxcursor-dev \
          libxinerama-dev
        
        # OpenGL libraries (for potential GPU acceleration)
        sudo apt-get install -y \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libegl1-mesa-dev \
          libgles2-mesa-dev
        
        # Verify critical packages were installed
        echo "Verifying critical package installations..."
        pkg-config --modversion glib-2.0 || (echo "ERROR: glib-2.0 not found" && exit 1)
        pkg-config --modversion gtk+-3.0 || (echo "ERROR: gtk+-3.0 not found" && exit 1)
        pkg-config --modversion webkit2gtk-4.0 || (echo "ERROR: webkit2gtk-4.0 not found" && exit 1)
        pkg-config --modversion sqlite3 || (echo "ERROR: sqlite3 not found" && exit 1)
        pkg-config --modversion openssl || (echo "ERROR: openssl not found" && exit 1)
        
        # Show installed library versions for debugging
        echo "Installed library versions:"
        pkg-config --modversion libpng || echo "libpng: not found"
        pkg-config --modversion libjpeg || echo "libjpeg: not found"
        pkg-config --modversion libwebp || echo "libwebp: not found"
        pkg-config --modversion libavcodec || echo "libavcodec: not found"
        pkg-config --modversion libavformat || echo "libavformat: not found"
        
        # Set up library paths
        sudo ldconfig

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check code formatting
      working-directory: ./src-tauri
      run: cargo fmt -- --check

    - name: Run Clippy (basic features only)
      working-directory: ./src-tauri
      env:
        PKG_CONFIG_ALLOW_SYSTEM_CFLAGS: 1
        PKG_CONFIG_ALLOW_SYSTEM_LIBS: 1
        RUST_BACKTRACE: 1
      run: |
        echo "Running Clippy with default features..."
        cargo clippy --lib -- -D warnings

    - name: Run basic tests
      working-directory: ./src-tauri
      env:
        TEST_MODE: true
        PKG_CONFIG_ALLOW_SYSTEM_CFLAGS: 1
        PKG_CONFIG_ALLOW_SYSTEM_LIBS: 1
        RUST_BACKTRACE: 1
        # Ensure SQLite extension loading works
        SQLITE3_LIB_DIR: /usr/lib/x86_64-linux-gnu
        SQLITE3_INCLUDE_DIR: /usr/include
      run: |
        echo "Running tests with default features..."
        cargo test --lib

    - name: Test basic build
      working-directory: ./src-tauri
      env:
        PKG_CONFIG_ALLOW_SYSTEM_CFLAGS: 1
        PKG_CONFIG_ALLOW_SYSTEM_LIBS: 1
        RUST_BACKTRACE: 1
      run: |
        echo "Testing build with default features..."
        cargo check
        
        echo "Testing build with all features..."
        cargo check --all-features || true
        
        echo "Testing release build..."
        cargo check --release